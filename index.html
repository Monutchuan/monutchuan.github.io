<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC - 主页</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- 顶部区域 -->
    <div class="top-bar">
        <div class="logo-section">
            <div class="logo">MTC</div>
            <div class="weather-widget">
                <span>🌤️</span>
                <span>泉州市 22°C ~9°C 微风</span>
            </div>
        </div>
        <div class="top-right">
            <div class="zh-slogan">新一代的最新选择!</div>
            <div class="en-slogan">The latest choice of the new generation!</div>
        </div>
    </div>

    <!-- 主导航 -->
    <nav class="main-nav">
        <div class="nav-container">
            <a class="nav-item active">首页</a>
            <a class="nav-item" href="video.html">视频</a>
            <a class="nav-item" href="server.html">服务器</a>
            <a class="nav-item" href="animation.html">动画</a>
            <a class="nav-item" href="game.html">游戏</a>
            <a class="nav-item" href="tweet.html">动态</a>
            <a class="nav-item" href="text.html">文章</a>
            <a class="nav-item" href="wiki.html">维基</a>
            <a class="nav-item" href="tool.html">工具</a>
        </div>
    </nav>

    <!-- 主横幅 -->
    <div class="hero-banner">
        <div class="banner-content">
            <img id="bannerImage" src="images/山川欢迎界面PC.png" style="width: 200%; max-width: 2000px;">
        </div>
        <div class="pagination">
            <div class="page-dot active" data-page="1">1</div>
            <div class="page-dot" data-page="2">2</div>
            <div class="page-dot" data-page="3">3</div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <div class="bottom-nav-container">
            <a class="bottom-nav-item" href="index.html">主站</a>
            <span class="separator">|</span>
            <a class="bottom-nav-item" href="tell.html">留言</a>
            <span class="separator">|</span>
            <a class="bottom-nav-item" href="money.html">氪金</a>
            <span class="separator">|</span>
            <a class="bottom-nav-item" href="supply.html">供应</a>
            <span class="separator">|</span>
            <a class="bottom-nav-item" href="about.html">关于</a>
        </div>
    </div>

    <script>    
        // ========== 分页切换图片（新增功能） ==========
        const bannerImage = document.getElementById('bannerImage');
        const pageDots = document.querySelectorAll('.page-dot');
        
        // 图片文件名映射
        const imageFiles = {
            1: '山川欢迎界面PC.png',
            2: '山川視頻PC.png',
            3: '山川服务器PC.png'
        };
        
        pageDots.forEach((dot, index) => {
            dot.addEventListener('click', function() {
                // 更新分页高亮
                pageDots.forEach(d => d.classList.remove('active'));
                this.classList.add('active');
                
                // 切换图片
                const pageNum = index + 1;
                bannerImage.src = `images/${imageFiles[pageNum]}`;
            });
        });
    </script>
</body>
</html>
